schema: spec-driven

context: |
  Tech stack: TypeScript 5.9 (strict), Node.js 18, ws (WebSockets), Jest 30, Playwright
  Domain: real-time multiplayer game platform for corporate town halls
  Two game modes: Buzzword Bingo and Teams Trivia (elimination quiz)
  Architecture: cloud relay (Render.com) + local admin server + browser players
  Pure core layer (src/core/) has zero I/O — all side effects in src/server/ and src/client/
  Protocol: JSON discriminated unions (type/envelope field); see src/server/protocol.ts
  All changes go through openspec; see CLAUDE.md for full developer guide

rules:
  tasks:
    - Include a task to update CLAUDE.md if directory structure, protocol messages, URL routes, or dev commands changed
  proposal:
    - Keep proposals under 500 words
    - Include a "Non-goals" section
