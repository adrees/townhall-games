<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Trivia — Broadcast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #1B2338;
      --bg-panel:    #141C2D;
      --bg-card:     #202C42;
      --answer-a:    #F7B733;
      --answer-b:    #F0722A;
      --answer-c:    #2EC4B5;
      --answer-d:    #6BC96E;
      --active:      #3ECFBE;
      --eliminated:  #2A3549;
      --elim-text:   #3D4F6B;
      --text:        #EDF0F7;
      --text-muted:  #7B8FB0;
      --divider:     #243050;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0E1525;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    /* ── 16:9 stage ─────────────────────────────────────────────────────── */
    #stage {
      width: 100vw;
      height: 56.25vw; /* 16:9 */
      max-height: 100vh;
      max-width: 177.78vh; /* 16:9 inverse */
      background: var(--bg);
      display: grid;
      grid-template-rows: 1fr 2fr;
      position: relative;
      overflow: hidden;
    }

    /* ── Header (top 1/3) ───────────────────────────────────────────────── */
    #header {
      border-bottom: 2px solid var(--divider);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 2vw;
      padding: 0 3vw;
      position: relative;
    }

    /* logo mark */
    #logoMark {
      height: 8vh;
      width: auto;
      flex-shrink: 0;
    }

    /* centre content — switches by phase */
    #headerCenter {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.4vh;
    }

    #gameTitle {
      font-family: 'Syne', sans-serif;
      font-size: clamp(24px, 4.5vh, 64px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    #headerSub {
      font-size: clamp(14px, 2.8vh, 38px);
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* right — question display / correct answer reveal */
    #headerRight {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5vh;
    }

    #playerCountBadge {
      font-size: clamp(14px, 2.8vh, 38px);
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* correct answer reveal (survivor phase) */
    #correctReveal {
      display: none;
      align-items: center;
      gap: 1.5vw;
      background: var(--bg-card);
      border-radius: 1vh;
      padding: 1.2vh 2vw;
      border: 1px solid var(--divider);
    }
    #correctReveal.visible { display: flex; }

    #correctLetter {
      font-family: 'Syne', sans-serif;
      font-size: clamp(24px, 6vh, 80px);
      font-weight: 800;
      line-height: 1;
    }
    #correctText {
      font-size: clamp(14px, 2.8vh, 38px);
      font-weight: 600;
      color: var(--text);
      max-width: 28vw;
      line-height: 1.2;
    }

    /* question phase header overlay */
    #questionHeader {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 0.6vh;
    }
    #questionHeader.visible { display: flex; }

    #questionNum {
      font-size: clamp(12px, 2.2vh, 28px);
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #questionHeaderText {
      font-family: 'Syne', sans-serif;
      font-size: clamp(18px, 3.8vh, 54px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    /* countdown ring in header (question phase) */
    #countdownWrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.3vh;
    }
    #countdownWrap.visible { display: flex; }
    #countdownRing { transform: rotate(-90deg); }
    #ringTrack { fill: none; stroke: var(--divider); stroke-width: 7; }
    #ringFill  { fill: none; stroke: var(--active); stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    #countdownNum {
      font-family: 'Syne', sans-serif;
      font-size: clamp(16px, 4vh, 52px);
      font-weight: 800;
      color: var(--text);
    }

    /* ── Player viz (bottom 2/3) ────────────────────────────────────────── */
    #playerViz {
      padding: 1.5vh 2vw;
      overflow: hidden;
      position: relative;
    }
    #playerViz.hidden { display: none; }

    /* breakdown bar overlay (sits at top of viz during breakdown) */
    #breakdownBars {
      display: none;
      position: absolute;
      top: 1.5vh;
      right: 2vw;
      flex-direction: column;
      gap: 0.6vh;
      z-index: 10;
      background: rgba(27,35,56,0.85);
      border-radius: 1vh;
      padding: 1vh 1.5vw;
      border: 1px solid var(--divider);
      min-width: 14vw;
    }
    #breakdownBars.visible { display: flex; }

    .brow {
      display: flex;
      align-items: center;
      gap: 0.8vw;
    }
    .blabel {
      font-family: 'Syne', sans-serif;
      font-size: clamp(14px, 2.2vh, 30px);
      font-weight: 800;
      width: 2vw;
      flex-shrink: 0;
    }
    .btrack {
      flex: 1;
      height: clamp(10px, 1.6vh, 22px);
      background: var(--bg-card);
      border-radius: 9999px;
      overflow: hidden;
      min-width: 6vw;
    }
    .bfill {
      height: 100%;
      width: 0%;
      border-radius: 9999px;
      transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bcount {
      font-size: clamp(12px, 1.8vh, 24px);
      font-weight: 700;
      color: var(--text-muted);
      width: 3vw;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Grid ───────────────────────────────────────────────────────────── */
    #playerGrid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(22px, 3.5vw, 52px), 1fr));
      gap: clamp(3px, 0.5vw, 8px);
      align-content: start;
    }

    /* square tile (normal mode) */
    .ptile {
      aspect-ratio: 1;
      border-radius: clamp(3px, 0.4vw, 7px);
      background: var(--active);
      transition: background 0.5s ease, opacity 0.5s ease, transform 0.5s ease;
      position: relative;
      overflow: hidden;
    }
    .ptile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      border-radius: inherit;
    }
    .ptile.answer-a { background: var(--answer-a); }
    .ptile.answer-b { background: var(--answer-b); }
    .ptile.answer-c { background: var(--answer-c); }
    .ptile.answer-d { background: var(--answer-d); }
    .ptile.no-answer { background: #2A3A52; opacity: 0.5; }
    @keyframes tileVanish {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(0.3); opacity: 0; }
    }
    .ptile.vanishing {
      animation: tileVanish 0.45s ease-in forwards;
      pointer-events: none;
    }

    /* name tile (final 10 mode) */
    #playerGrid.final10 {
      grid-template-columns: repeat(auto-fill, minmax(clamp(80px, 14vw, 220px), 1fr));
      gap: clamp(6px, 1vw, 16px);
      align-content: center;
    }
    .ptile.nametile {
      aspect-ratio: unset;
      height: clamp(36px, 7vh, 90px);
      border-radius: clamp(6px, 0.8vw, 12px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1vw;
    }
    .ptile.nametile .name-label {
      font-family: 'Syne', sans-serif;
      font-size: clamp(14px, 3vh, 42px);
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    @keyframes dropOff {
      0%   { transform: translateY(0);    opacity: 1; }
      100% { transform: translateY(120%); opacity: 0; }
    }
    .ptile.dropping {
      animation: dropOff 0.5s ease-in forwards;
    }

    /* ── Winner screen ───────────────────────────────────────────────────── */
    #winnerScreen {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2vh;
      background: var(--bg);
      z-index: 100;
    }
    #winnerScreen.visible { display: flex; }

    #winnerLabel {
      font-size: clamp(16px, 3vh, 42px);
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    #winnerNames {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 9vw, 120px);
      font-weight: 800;
      color: var(--answer-a);
      text-align: center;
      line-height: 1;
      padding: 0 4vw;
      animation: winPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes winPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #winnerSurvivorNote {
      font-size: clamp(10px, 1.6vh, 22px);
      color: var(--text-muted);
    }

    /* ── Debug ───────────────────────────────────────────────────────────── */
    #debugPanel {
      position: absolute;
      bottom: 1vh;
      right: 1vw;
      width: 22vw;
      z-index: 200;
      display: none;
    }
    #debugPanel details summary {
      cursor: pointer;
      font-weight: 700;
      background: #0f1522;
      color: #8899bb;
      padding: 3px 8px;
      border-radius: 4px 4px 0 0;
      font-size: 11px;
    }
    #debugPanel pre {
      background: #0f1522;
      color: #99aabb;
      padding: 6px 8px;
      margin: 0;
      font-size: 10px;
      max-height: 20vh;
      overflow: auto;
      border-radius: 0 0 4px 4px;
    }
  </style>
</head>
<body>
<div id="stage">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <div id="header">
    <img id="logoMark" src="/product/dept-logo.png" alt="Logo">

    <div id="headerCenter">
      <div id="gameTitle">Teams Trivia</div>
      <!-- shown during question phase -->
      <div id="questionHeader">
        <div id="questionNum">Question 1</div>
        <div id="questionHeaderText"></div>
      </div>
      <!-- shown outside question phase -->
      <div id="headerSub" id="phaseSub">Waiting for players</div>
    </div>

    <div id="headerRight">
      <div id="playerCountBadge">0 players</div>

      <!-- countdown ring (question phase) -->
      <div id="countdownWrap">
        <svg id="countdownRing" width="80" height="80" viewBox="0 0 80 80">
          <circle id="ringTrack" cx="40" cy="40" r="34"/>
          <circle id="ringFill"  cx="40" cy="40" r="34"/>
        </svg>
        <div id="countdownNum">10</div>
      </div>

      <!-- correct answer (survivor phase) -->
      <div id="correctReveal">
        <span id="correctLetter">A</span>
        <span id="correctText"></span>
      </div>
    </div>
  </div>

  <!-- ── Player visualisation ───────────────────────────────────── -->
  <div id="playerViz">
    <div id="playerGrid"></div>

    <!-- breakdown bar overlay -->
    <div id="breakdownBars">
      <div class="brow">
        <span class="blabel" style="color:var(--answer-a)">A</span>
        <div class="btrack"><div id="barA" class="bfill" style="background:var(--answer-a)"></div></div>
        <span id="cntA" class="bcount">0</span>
      </div>
      <div class="brow">
        <span class="blabel" style="color:var(--answer-b)">B</span>
        <div class="btrack"><div id="barB" class="bfill" style="background:var(--answer-b)"></div></div>
        <span id="cntB" class="bcount">0</span>
      </div>
      <div class="brow">
        <span class="blabel" style="color:var(--answer-c)">C</span>
        <div class="btrack"><div id="barC" class="bfill" style="background:var(--answer-c)"></div></div>
        <span id="cntC" class="bcount">0</span>
      </div>
      <div class="brow">
        <span class="blabel" style="color:var(--answer-d)">D</span>
        <div class="btrack"><div id="barD" class="bfill" style="background:var(--answer-d)"></div></div>
        <span id="cntD" class="bcount">0</span>
      </div>
    </div>
  </div>

  <!-- ── Winner overlay ─────────────────────────────────────────── -->
  <div id="winnerScreen">
    <div id="winnerLabel">Winner</div>
    <div id="winnerNames"></div>
    <div id="winnerSurvivorNote"></div>
  </div>

  <!-- ── Debug ──────────────────────────────────────────────────── -->
  <div id="debugPanel">
    <details>
      <summary>Debug</summary>
      <pre id="debugJson">{}</pre>
    </details>
  </div>

</div>
<script type="module" src="/shared/trivia-broadcast.js"></script>
</body>
</html>
