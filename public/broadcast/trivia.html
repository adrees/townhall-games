<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Trivia - Broadcast</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── Phase switching ────────────────────────────────────────────────── */
    #lobbySection,
    #eliminationSection,
    #questionSection,
    #breakdownSection,
    #survivorSection,
    #winnerSection { display: none; }

    body[data-phase="lobby"]       #lobbySection       { display: flex; }
    body[data-phase="elimination"] #eliminationSection { display: flex; }
    body[data-phase="question"]    #questionSection    { display: flex; }
    body[data-phase="breakdown"]   #breakdownSection   { display: flex; }
    body[data-phase="survivor"]    #survivorSection    { display: flex; }
    body[data-phase="winner"]      #winnerSection      { display: flex; }

    /* ── Word cloud visibility ──────────────────────────────────────────── */
    #wordCloud { display: none; }
    body[data-phase="lobby"]       #wordCloud { display: block; }
    body[data-phase="elimination"] #wordCloud { display: block; }

    /* ── Shared layout ──────────────────────────────────────────────────── */
    .phase-root {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 80vh;
      padding: 20px;
      box-sizing: border-box;
    }

    /* ── Word clouds ────────────────────────────────────────────────────── */
    #wordCloud {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
      border-radius: 8px;
    }

    #survivorCloud {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
      border-radius: 8px;
    }

    .player-name {
      position: absolute;
      font-weight: bold;
      font-size: 18px;
      color: #2c3e50;
      white-space: nowrap;
      transition: transform 0.8s ease-out, font-size 0.6s ease, opacity 0.4s ease;
      pointer-events: none;
      user-select: none;
    }

    .player-name.eliminated {
      transform: translateY(200px) !important;
      opacity: 0;
    }

    #playerCountLabel {
      font-size: 18px;
      color: #666;
      margin-top: 10px;
    }

    /* ── Question ───────────────────────────────────────────────────────── */
    #questionText {
      font-size: clamp(24px, 4vw, 48px);
      font-weight: bold;
      text-align: center;
      margin-bottom: 30px;
      max-width: 900px;
    }

    #answerLabels {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 30px;
    }

    .answer-label {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #e8f4fd;
      border: 3px solid #3498db;
      border-radius: 10px;
      padding: 12px 20px;
    }

    .answer-letter {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #3498db;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      flex-shrink: 0;
    }

    .answer-text {
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: bold;
      color: #2c3e50;
    }

    #countdownRing { transform: rotate(-90deg); }
    #ringTrack { fill: none; stroke: #eee; stroke-width: 8; }
    #ringFill  { fill: none; stroke: #3498db; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

    #countdownNumber {
      font-size: 28px;
      font-weight: bold;
      color: #2c3e50;
      margin-top: 8px;
    }

    /* ── Breakdown bars ─────────────────────────────────────────────────── */
    #breakdownSection { flex-direction: column; }

    .bar-row {
      display: flex;
      align-items: center;
      margin: 8px 0;
      width: 100%;
      max-width: 700px;
    }

    .bar-label {
      width: 36px;
      font-size: 22px;
      font-weight: bold;
      color: #2c3e50;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 44px;
      background: #ecf0f1;
      border-radius: 6px;
      overflow: hidden;
      margin: 0 10px;
    }

    .bar-fill {
      height: 100%;
      background: #3498db;
      width: 0%;
      transition: width 0.5s ease;
      border-radius: 6px;
    }

    .bar-fill.correct { background: #27ae60; }

    .bar-count {
      width: 40px;
      font-size: 20px;
      font-weight: bold;
      color: #555;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Survivor ───────────────────────────────────────────────────────── */
    #survivorCount {
      font-size: 36px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 16px;
    }

    /* ── Winner ─────────────────────────────────────────────────────────── */
    #winnerSection { flex-direction: column; text-align: center; }

    #winnerLabel { font-size: 28px; color: #666; margin-bottom: 20px; }

    #winnerNames {
      font-size: clamp(40px, 8vw, 100px);
      font-weight: bold;
      color: #f0a500;
      animation: winnerPop 0.6s ease-out;
    }

    @keyframes winnerPop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Debug panel ────────────────────────────────────────────────────── */
    #debugPanel {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 340px;
      z-index: 1000;
    }

    #debugPanel details summary {
      cursor: pointer;
      font-weight: bold;
      background: #1e1e1e;
      color: #ccc;
      padding: 4px 8px;
      border-radius: 4px 4px 0 0;
    }

    #debugPanel pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 8px;
      margin: 0;
      font-size: 11px;
      max-height: 260px;
      overflow: auto;
      border-radius: 0 0 4px 4px;
    }
  </style>
</head>
<body>

  <!-- ─── Lobby ─────────────────────────────────────────────────────────── -->
  <div id="lobbySection" class="phase-root">
    <h1 style="margin-bottom:10px;">Teams Trivia</h1>
    <p id="playerCountLabel">Waiting for players...</p>
  </div>

  <!-- ─── Word cloud (persistent: shown in lobby + elimination phases) ───── -->
  <div id="wordCloud"></div>

  <!-- ─── Elimination ──────────────────────────────────────────────────── -->
  <div id="eliminationSection" class="phase-root"></div>

  <!-- ─── Question ──────────────────────────────────────────────────────── -->
  <div id="questionSection" class="phase-root">
    <div id="questionText"></div>
    <div id="answerLabels">
      <div class="answer-label"><span class="answer-letter">A</span><span class="answer-text" id="answerTextA"></span></div>
      <div class="answer-label"><span class="answer-letter">B</span><span class="answer-text" id="answerTextB"></span></div>
      <div class="answer-label"><span class="answer-letter">C</span><span class="answer-text" id="answerTextC"></span></div>
      <div class="answer-label"><span class="answer-letter">D</span><span class="answer-text" id="answerTextD"></span></div>
    </div>
    <svg id="countdownRing" width="120" height="120" viewBox="0 0 120 120">
      <circle id="ringTrack" cx="60" cy="60" r="52"/>
      <circle id="ringFill"  cx="60" cy="60" r="52"/>
    </svg>
    <div id="countdownNumber">10</div>
  </div>

  <!-- ─── Breakdown ─────────────────────────────────────────────────────── -->
  <div id="breakdownSection" class="phase-root">
    <h2 style="margin-bottom:20px;">Results</h2>
    <div class="bar-row">
      <span class="bar-label">A</span>
      <div class="bar-track"><div id="barA" class="bar-fill"></div></div>
      <span id="countA" class="bar-count">0</span>
    </div>
    <div class="bar-row">
      <span class="bar-label">B</span>
      <div class="bar-track"><div id="barB" class="bar-fill"></div></div>
      <span id="countB" class="bar-count">0</span>
    </div>
    <div class="bar-row">
      <span class="bar-label">C</span>
      <div class="bar-track"><div id="barC" class="bar-fill"></div></div>
      <span id="countC" class="bar-count">0</span>
    </div>
    <div class="bar-row">
      <span class="bar-label">D</span>
      <div class="bar-track"><div id="barD" class="bar-fill"></div></div>
      <span id="countD" class="bar-count">0</span>
    </div>
  </div>

  <!-- ─── Survivor ──────────────────────────────────────────────────────── -->
  <div id="survivorSection" class="phase-root">
    <div id="survivorCount"></div>
    <div id="survivorCloud"></div>
  </div>

  <!-- ─── Winner ────────────────────────────────────────────────────────── -->
  <div id="winnerSection" class="phase-root">
    <div id="winnerLabel">Winner</div>
    <div id="winnerNames"></div>
  </div>

  <!-- ─── Debug panel ───────────────────────────────────────────────────── -->
  <div id="debugPanel" style="display:none;">
    <details>
      <summary>Debug: Live Session State</summary>
      <pre id="debugJson">{}</pre>
    </details>
  </div>

  <script type="module" src="/shared/trivia-broadcast.js"></script>
</body>
</html>
