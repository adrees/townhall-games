<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Townhall Games</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="notificationArea" class="notification-area hidden"></div>
  <div class="container">
    <h1>Townhall Games</h1>

    <!-- Join -->
    <div id="joinSection" class="section">
      <h2>Join Game</h2>
      <div class="form-group">
        <label for="screenName">Screen Name</label>
        <input type="text" id="screenName" placeholder="Enter your name" maxlength="30">
      </div>
      <button id="joinBtn">Join</button>
    </div>

    <!-- Waiting -->
    <div id="waitingSection" class="section hidden">
      <div class="status-bar">Waiting for admin to start the game...</div>
    </div>

    <!-- Playing -->
    <div id="playingSection" class="hidden">
      <div class="round-indicator" id="roundIndicator">Round 1</div>
      <div class="status-bar" id="statusBar">Mark your words!</div>
      <div class="bingo-grid" id="bingoGrid"></div>
    </div>

    <!-- Win overlay -->
    <div id="winBanner" class="win-banner hidden"></div>

    <!-- Leaderboard -->
    <div id="leaderboardSection" class="hidden">
      <div class="leaderboard">
        <h2>Leaderboard</h2>
        <table>
          <thead>
            <tr><th>#</th><th>Player</th><th>Points</th><th>Rounds Won</th></tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Trivia -->
    <div id="triviaSection" class="hidden">

      <!-- Holding screen shown during question_preview -->
      <div id="triviaWaiting" class="hidden">
        <div class="status-bar">Get ready...</div>
      </div>

      <!-- Live question + answer buttons + countdown -->
      <div id="triviaQuestion" class="hidden">
        <div id="countdown" class="round-indicator"></div>
        <p id="questionText" class="status-bar"></p>
        <div id="answerButtons">
          <button class="answer-btn" data-answer="A">A</button>
          <button class="answer-btn" data-answer="B">B</button>
          <button class="answer-btn" data-answer="C">C</button>
          <button class="answer-btn" data-answer="D">D</button>
        </div>
      </div>

      <!-- Breakdown phase: waiting for reveal -->
      <div id="triviaBreakdown" class="hidden">
        <div class="status-bar">Waiting for results...</div>
      </div>

      <!-- Outcome: survived / eliminated / spectator / game_over -->
      <div id="triviaOutcome" class="hidden">
        <p id="outcomeText" class="status-bar"></p>
        <p id="correctAnswerText"></p>
        <p id="survivorCountText"></p>
      </div>

    </div>
  </div>

  <script type="module" src="/shared/player.js"></script>
  <script type="module" src="/shared/trivia-handlers.js"></script>
</body>
</html>
